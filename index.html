<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Travel | Catálogo Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCyvhxSpo4rsYy7NT1pRwMXepl0ILHynN4",
        authDomain: "vt-travel-catalogo.firebaseapp.com",
        projectId: "vt-travel-catalogo",
        databaseURL: "https://vt-travel-catalogo-default-rtdb.firebaseio.com/",
        storageBucket: "vt-travel-catalogo.firebasestorage.app",
        messagingSenderId: "1007851715418",
        appId: "1:1007851715418:web:03b5f541f645038612d163"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      window.db = db; window.dbRef = ref; window.dbSet = set; window.dbOnValue = onValue;
    </script>

    <style>
      @keyframes borderRotate {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }
      
      @keyframes contactPulseBrinco {
        0% { transform: scale(1) translateY(0); box-shadow: 0 0 0 0 rgba(0, 209, 255, 0.4); }
        25% { transform: scale(1.1) translateY(-15px); }
        50% { transform: scale(1) translateY(0); }
        70% { box-shadow: 0 0 0 15px rgba(0, 209, 255, 0); }
        100% { transform: scale(1) translateY(0); box-shadow: 0 0 0 0 rgba(0, 209, 255, 0); }
      }

      @keyframes textGlow3D {
        0%, 100% {
          text-shadow: 0 1px 0 #1B365D, 0 2px 0 #1B365D, 0 3px 0 #00D1FF, 0 4px 0 #00D1FF, 0 5px 10px rgba(0, 209, 255, 0.8);
          transform: translateY(0);
        }
        50% {
          text-shadow: 0 1px 0 #fff, 0 2px 0 #fff, 0 3px 0 #00D1FF, 0 4px 0 #00D1FF, 0 5px 15px rgba(255, 255, 255, 0.8);
          transform: translateY(-5px);
        }
      }

      .card-modern::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 20%;
        height: 200%;
        background: rgba(255, 255, 255, 0.1);
        transform: rotate(30deg);
        transition: all 0.7s;
      }
      .card-modern:hover::after { left: 120%; }

      .vt-title-3d {
        font-weight: 900;
        text-transform: uppercase;
        color: #fff;
        animation: textGlow3D 3s ease-in-out infinite;
        display: inline-block;
        font-size: 5rem;
      }

      .nav-premium-container {
        position: sticky;
        top: 150px; 
        z-index: 100;
        margin: 20px auto;
        width: 98%; 
        max-width: 1700px; 
        padding: 3px;
        border-radius: 20px;
        background: linear-gradient(90deg, #1B365D, #00D1FF, #1B365D, #00D1FF);
        background-size: 200% auto;
        animation: borderRotate 4s linear infinite;
      }

      .nav-premium-inner {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(15px);
        border-radius: 17px;
        padding: 1rem 3rem; 
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 80px;
        position: relative;
      }

      .logo-premium {
        position: absolute;
        left: -20px;
        top: 50%;
        transform: translateY(-50%);
        width: 450px; 
        height: auto;
        z-index: 150;
        filter: drop-shadow(0 0 15px rgba(0, 209, 255, 0.5));
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
      }

      .logo-premium:hover {
        transform: translateY(-50%) scale(1.1);
        filter: drop-shadow(0 0 25px rgba(0, 209, 255, 0.8));
      }

      .main-content { margin-top: 300px; }

      @media (max-width: 767px) {
        .logo-premium { width: 180px; left: 5px; }
        .nav-premium-inner { padding: 1rem 0.8rem; }
        .vt-title-3d { font-size: 2.1rem; }
        .main-content { margin-top: 250px; }
        .nav-premium-container { top: 80px; } 
      }

      .card-modern { 
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        cursor: pointer; position: relative; overflow: hidden; 
        border-radius: 2.5rem; height: 380px; border: 1px solid rgba(0,209,255,0.1);
      }
      
      .card-modern:hover { 
        transform: translateY(-15px) scale(1.05); 
        box-shadow: 0 0 30px 5px rgba(0, 209, 255, 0.6);
        border-color: #00D1FF; 
      }

      .card-modern img { transition: transform 0.8s ease; width: 100%; height: 100%; object-fit: cover; }
      .overlay-gradient { background: linear-gradient(to top, rgba(27, 54, 93, 0.9) 0%, transparent 100%); }
      
      #world-slideshow { position: fixed; inset: 0; z-index: -1; opacity: 0.4; background-size: cover; background-position: center; transition: background-image 2s; background-color: #0f172a; }
      
      .info-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
      .modal-box { background: #1B365D; border: 2px solid #00D1FF; border-radius: 2.5rem; width: 100%; max-width: 1100px; max-height: 90vh; padding: 40px; text-align: center; position: relative; overflow-y: auto; }
      
      .floating-icon { 
        position: fixed; bottom: 30px; width: 65px; height: 65px; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        font-size: 35px; color: white; z-index: 500; 
        transition: all 0.3s ease;
        animation: contactPulseBrinco 2.2s infinite ease-in-out;
      }
      .icon-wa { right: 30px; background: #25D366; }
      .icon-ig { right: 110px; background: #E1306C; }

      .tiktok-section { margin-top: 100px; padding-bottom: 100px; text-align: center; }
      .tiktok-logo-animated { 
        display: inline-flex; width: 120px; height: 120px; 
        background: #000; color: #fff; border-radius: 30px; 
        align-items: center; justify-content: center; 
        font-size: 70px; border: 3px solid #00D1FF; 
        box-shadow: 0 0 30px rgba(0, 209, 255, 0.3);
        animation: contactPulseBrinco 2.5s infinite ease-in-out;
      }

      .promo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-top: 20px; }
      .promo-item { border-radius: 1.5rem; border: 1px solid rgba(0, 209, 255, 0.3); overflow: hidden; transition: all 0.3s; background: #0f172a; text-align: left; }
      .promo-item:hover { transform: scale(1.02); border-color: #00D1FF; box-shadow: 0 0 15px rgba(0, 209, 255, 0.4); }
      .promo-item img { width: 100%; height: 150px; object-fit: cover; }
      .promo-info { padding: 12px; }

      /* RESALTADO PROMOCIONES */
      .btn-promo-highlight {
          color: #00D1FF !important;
          font-weight: 900 !important;
          text-shadow: 0 0 10px rgba(0, 209, 255, 0.5);
          letter-spacing: 1px;
      }
    </style>
</head>
<body class="bg-slate-900 text-white">
    <div id="world-slideshow"></div>
    
    <a href="https://wa.me/526673717073" target="_blank" class="floating-icon icon-wa"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/vttravel_viajes/" target="_blank" class="floating-icon icon-ig"><i class="fab fa-instagram"></i></a>

    <div class="nav-premium-container" id="mainNav">
        <nav class="nav-premium-inner">
            <img src="image_0.png" alt="VT Travel" class="logo-premium">
            <div class="nav-elements-mobile flex gap-4 md:gap-8 items-center font-black text-[10px] md:text-xs uppercase text-white italic tracking-tighter ml-auto">
                <button onclick="showPop('promos')" class="btn-promo-highlight hover:scale-110 transition-all flex items-center gap-1.5">
                    <i class="fas fa-tag"></i> Promociones
                </button>
                <button onclick="showPop('ubicacion')" class="hover:text-cyan-400 transition-colors flex items-center gap-1.5">
                    <i class="fas fa-location-dot text-cyan-400"></i> Ubicación
                </button>
                <button onclick="showPop('contacto')" class="bg-cyan-500 text-slate-900 px-6 md:px-8 py-2.5 rounded-full hover:bg-white transition-all btn-contact-premium font-bold shadow-lg">
                    Contacto
                </button>
            </div>
        </nav>
    </div>

    <div id="infoPop" class="info-modal" onclick="if(event.target == this) hidePop()">
        <div class="modal-box">
            <button onclick="hidePop()" class="absolute top-4 right-6 text-3xl text-cyan-400">×</button>
            <div id="popContent"></div>
        </div>
    </div>

    <main class="main-content py-12 px-4 md:px-20 max-w-[1400px] mx-auto relative z-10">
        <div class="text-center mb-10" id="headerTitle">
            <h1 class="vt-title-3d italic">CATÁLOGO VT</h1>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="gridPrincipal"></div>

        <section class="tiktok-section" id="tiktokSection">
            <h2 class="text-2xl font-black italic text-cyan-400 mb-8 uppercase tracking-widest">SÍGUENOS EN TIKTOK</h2>
            <a href="https://www.tiktok.com/@vttravel_culiacan?lang=es-419" target="_blank" class="tiktok-logo-animated">
                <i class="fab fa-tiktok"></i>
            </a>
        </section>
    </main>

    <script>
        const cats = [
            {id: 1, n: 'Playas', s: 2, d: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'},
            {id: 2, n: 'Europa', s: 2, d: 'https://images.unsplash.com/photo-1493936734716-77ba6da66365'},
            {id: 3, n: 'Cruceros', s: 1, d: 'https://images.unsplash.com/photo-1548574505-5e239809ee19'},
            {id: 4, n: 'Lunas de Miel', s: 1, d: 'https://images.unsplash.com/photo-1519225421980-715cb0215aed'},
            {id: 5, n: 'Viajes de XV', s: 1, d: 'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7'},
            {id: 6, n: 'Asia', s: 1, d: 'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d'},
            {id: 7, n: 'Canadá', s: 1, d: 'https://images.unsplash.com/photo-1503614472-8c93d56e92ce?auto=format&fit=crop&w=800&q=80'},
            {id: 8, n: 'África', s: 1, d: 'https://images.unsplash.com/photo-1516426122078-c23e76319801'},
            {id: 9, n: 'Hoteles', s: 2, d: 'https://images.unsplash.com/photo-1566073771259-6a8506099945'}
        ];

        const promosList = [
            {t: "PUNTA CANA", d: "7 días / 6 noches", p: "$899 USD", i: "https://images.unsplash.com/photo-1584132967334-10e028bd69f7?auto=format&fit=crop&w=500&q=80"},
            {t: "EUROPA MTY", d: "17 días (Salida MTY)", p: "$1,599 USD", i: "https://images.unsplash.com/photo-1493936734716-77ba6da66365"},
            {t: "ESENCIA EUROPEA", d: "17 días / 15 noches", p: "$1,499 USD", i: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad"},
            {t: "EUROPA CLÁSICA", d: "17 días / 15 noches", p: "$1,499 USD", i: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34"},
            {t: "COLOMBIA MULTICULTURAL", d: "10 días / 9 noches", p: "$799 USD", i: "https://images.unsplash.com/photo-1518105779142-d975f22f1b0a"},
            {t: "JAPÓN MTY", d: "11 días / 8 noches", p: "$1,899 USD", i: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e"},
            {t: "JAPÓN GENERAL", d: "11 días / 8 noches", p: "$1,899 USD", i: "https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d"},
            {t: "EUROPA CON CRUCERO", d: "17 días / 15 noches", p: "$1,499 USD", i: "https://images.unsplash.com/photo-1548574505-5e239809ee19"},
            {t: "JAPÓN Y CHINA", d: "17 días / 14 noches", p: "$2,599 USD", i: "https://images.unsplash.com/photo-1540959733332-eab4deabeeaf"},
            {t: "DUBÁI CON JAPÓN", d: "14 días / 10 noches", p: "$1,699 USD", i: "https://images.unsplash.com/photo-1512453979798-5ea266f8880c"},
            {t: "CHINA Y DUBÁI", d: "13 días / 11 noches", p: "$1,599 USD", i: "https://cdn.pixabay.com/photo/2017/12/10/17/40/prague-3010407_1280.jpg"},
            {t: "EGIPTO FARAONES", d: "9 días / 7 noches", p: "$599 USD", i: "https://images.unsplash.com/photo-1539768942893-daf53e448371?auto=format&fit=crop&w=500&q=80"},
            {t: "TURQUÍA GOURMET", d: "15 días Especial", p: "Promo 2026", i: "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200"}
        ];

        const info = {
            ubicacion: `
                <i class="fas fa-map-location-dot text-6xl text-cyan-400 mb-6"></i>
                <h2 class="text-3xl font-black italic mb-4 uppercase text-white">DIRECCIÓN</h2>
                <p class="text-lg mb-8 italic text-white">Estado de Sonora 1411-A, Las Quintas, 80060 Culiacán Rosales, Sin.</p>
                <a href="https://www.google.com/maps/place/Vt+Travel+Culiacan/@24.818997,-107.3710182,15z/data=!4m6!3m5!1s0x86bcd9f7d47a54f3:0x7d37c3a3fde2a34!8m2!3d24.8173868!4d-107.3737504!16s%2Fg%2F1tf8tjtn?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="bg-cyan-400 text-slate-900 font-black py-4 px-12 rounded-full uppercase text-xs shadow-lg inline-block">Ver en Google Maps</a>`,
            contacto: `
                <i class="fas fa-phone-volume text-6xl text-cyan-400 mb-6"></i>
                <h2 class="text-3xl font-black italic mb-4 uppercase text-white">CONTACTO</h2>
                <p class="text-2xl font-black text-white underline italic mb-2">667 445 3071</p>
                <p class="text-2xl font-black text-white underline italic mb-4">667 445 3072</p>
                <p class="text-lg text-cyan-400 italic font-bold">candyojeda@hotmail.com</p>`,
            promos: `
                <h2 class="text-3xl font-black italic mb-2 uppercase text-cyan-400">13 PROMOCIONES EXCLUSIVAS</h2>
                <div class="promo-grid">
                    ${promosList.map(p => `
                        <div class="promo-item">
                            <img src="${p.i}" loading="lazy">
                            <div class="promo-info">
                                <h4 class="font-black italic text-cyan-400 text-sm uppercase">${p.t}</h4>
                                <p class="text-[10px] text-white opacity-70">${p.d}</p>
                                <p class="text-lg font-black mt-1 text-white">${p.p}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>`
        };

        function render(data = {}) {
            const grid = document.getElementById('gridPrincipal');
            grid.innerHTML = '';
            cats.forEach(c => {
                const url = (data && data[c.id]) ? data[c.id] : c.d;
                grid.innerHTML += `
                    <div class="card-modern ${c.s === 2 ? 'lg:col-span-2' : ''}" data-fade>
                        <img src="${url}">
                        <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                            <h3 class="${c.s === 2 ? 'text-4xl' : 'text-2xl'} font-black italic uppercase text-white">${c.n}</h3>
                        </div>
                    </div>`;
            });
        }

        function showPop(t){ document.getElementById('popContent').innerHTML = info[t]; document.getElementById('infoPop').style.display='flex'; }
        function hidePop(){ document.getElementById('infoPop').style.display='none'; }

        function init() { if(window.dbOnValue) { window.dbOnValue(window.dbRef(window.db, 'catalogo'), (snap) => { if(snap.val()) render(snap.val()); }); } else { setTimeout(init, 100); } }
        init();
        render();

        window.addEventListener('scroll', () => {
          const navBottom = document.getElementById('mainNav').getBoundingClientRect().bottom + 10;
          document.querySelectorAll('[data-fade], #headerTitle, #tiktokSection').forEach(el => {
            if (!el) return;
            const dist = el.getBoundingClientRect().top - navBottom;
            el.style.opacity = dist < 80 ? Math.max(0, Math.min(1, dist / 80)) : 1;
          });
        });

        const bgImg = [
            'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&w=1600&q=70', 
            'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&w=1600&q=70'
        ];
        bgImg.forEach(src => { const img = new Image(); img.src = src; });
        let bgI = 0;
        const slide = document.getElementById('world-slideshow');
        if(slide) slide.style.backgroundImage = `url('${bgImg[0]}')`;
        setInterval(() => {
            if(slide) { 
                bgI = (bgI + 1) % bgImg.length;
                slide.style.backgroundImage = `url('${bgImg[bgI]}')`; 
            }
        }, 6000);
    </script>
</body>
</html>
