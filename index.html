<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Travel | Agencia de Viajes Culiacán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              vt_oxford: '#1B365D',
              vt_cyan: '#00D1FF',
              vt_gold: '#FFC107',
            }
          }
        }
      }
    </script>
    <style>
      .card-zoom img { transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
      .card-zoom:hover img { transform: scale(1.1); }
      .overlay-gradient { background: linear-gradient(to top, rgba(27, 54, 93, 0.95) 0%, rgba(27, 54, 93, 0.4) 50%, transparent 100%); }
      #world-slideshow {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1; opacity: 0.12; filter: grayscale(100%) blur(4px);
        background-size: cover; background-position: center;
        transition: background-image 1.5s ease-in-out;
      }
    </style>
</head>
<body class="bg-white font-sans text-slate-900">

    <div id="world-slideshow"></div>

    <nav class="bg-white text-vt_oxford p-2 sticky top-0 z-50 flex justify-between items-center px-6 md:px-20 border-b-2 border-vt_cyan shadow-xl">
        <div class="flex items-center">
            <img src="image_0.png" alt="VT Travel Logo" class="h-16 w-auto object-contain">
        </div>
        
        <div class="hidden lg:flex gap-4 items-center uppercase tracking-widest font-black text-[10px]">
            <a href="http://googleusercontent.com/maps.google.com/3" target="_blank" class="text-vt_cyan border-2 border-vt_cyan px-4 py-2 rounded-full hover:bg-vt_cyan hover:text-white transition flex items-center gap-2">
                <i class="fas fa-map-marker-alt"></i> Nuestra Ubicación
            </a>
            <a href="https://wa.me/526671234567" target="_blank" class="bg-vt_gold text-vt_oxford px-4 py-2 rounded-full hover:bg-yellow-500 transition shadow-lg flex items-center gap-2">
                <i class="fab fa-whatsapp"></i> WhatsApp Directo
            </a>
        </div>
    </nav>

    <main class="py-16 px-4 md:px-20 max-w-[1400px] mx-auto relative z-10">
        <div class="mb-12 text-center">
            <h2 class="text-4xl font-black text-vt_oxford tracking-tighter uppercase italic">Explora el mundo <span class="text-vt_gold font-light uppercase">con VT Travel</span></h2>
            <div class="w-24 h-1 bg-vt_cyan mx-auto mt-6 rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="relative group h-80 overflow-hidden rounded-3xl shadow-lg card-zoom lg:col-span-2 border-2 border-vt_cyan/30">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 overlay-gradient p-8 flex flex-col justify-end text-white">
                    <h3 class="text-3xl font-black italic uppercase leading-none">Playas Nacionales</h3>
                    <p class="text-sm opacity-90">Mazatlán, Cancún y Los Cabos</p>
                </div>
            </div>

            <div class="relative group h-80 overflow-hidden rounded-3xl shadow-lg card-zoom">
                <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 overlay-gradient p-8 flex flex-col justify-end text-white">
                    <h3 class="text-3xl font-black italic uppercase leading-none">Europa</h3>
                    <p class="text-sm opacity-90">Tours por todo el continente</p>
                </div>
            </div>

            <div class="relative group h-80 overflow-hidden rounded-3xl shadow-lg card-zoom border-2 border-vt_gold/40">
                <img src="https://images.unsplash.com/photo-1544550581-5f7ceaf7f992?q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 overlay-gradient p-8 flex flex-col justify-end text-white">
                    <i class="fas fa-heart text-vt_gold text-2xl mb-2"></i>
                    <h3 class="text-3xl font-black italic uppercase">Lunas de Miel</h3>
                </div>
            </div>

            <div class="relative group h-80 overflow-hidden rounded-3xl shadow-lg card-zoom">
                <img src="https://images.unsplash.com/photo-1559640842225-85d111c60e6b?q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 overlay-gradient p-8 flex flex-col justify-end text-white">
                    <h3 class="text-3xl font-black italic uppercase leading-none">Cruceros</h3>
                </div>
            </div>

             <div class="relative group h-80 overflow-hidden rounded-3xl shadow-lg card-zoom">
                <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 overlay-gradient p-8 flex flex-col justify-end text-white text-right font-black italic">
                    <h3 class="text-3xl uppercase leading-none">Asia</h3>
                </div>
            </div>
        </div>
    </main>

    <a href="https://www.instagram.com/vttravel_viajes?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="fixed bottom-32 right-10 z-[100] bg-[#E4405F] text-white p-5 rounded-full shadow-2xl hover:scale-110 transition duration-300">
        <i class="fab fa-instagram text-4xl"></i>
    </a>

    <a href="https://wa.me/526671234567" target="_blank" class="fixed bottom-10 right-10 z-[100] bg-[#25D366] text-white p-5 rounded-full shadow-2xl hover:scale-110 transition duration-300">
        <i class="fab fa-whatsapp text-4xl"></i>
    </a>

    <script>
        const slideshow = document.getElementById('world-slideshow');
        const images = [
            'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?q=80&w=1600',
            'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?q=80&w=1600',
            'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?q=80&w=1600'
        ];
        let i = 0;
        function updateBg() {
            slideshow.style.backgroundImage = `url('${images[i]}')`;
            i = (i + 1) % images.length;
        }
        updateBg();
        setInterval(updateBg, 5000);
    </script>
</body>
</html>
