<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Travel | Agencia de Viajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { vt_oxford: '#1B365D', vt_cyan: '#00D1FF', vt_gold: '#FFC107' },
            animation: { 'float': 'floating 3.5s ease-in-out infinite' },
            keyframes: { floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } } }
          }
        }
      }
    </script>
    <style>
      .card-modern { 
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
        cursor: pointer; position: relative; overflow: hidden; border-radius: 2.5rem; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      }
      .card-modern:hover { transform: translateY(-15px) scale(1.03); box-shadow: 0 30px 60px rgba(0,209,255,0.3); }
      .card-modern img { transition: transform 0.8s ease; width: 100%; height: 100%; object-fit: cover; }
      .card-modern:hover img { transform: scale(1.1); }
      .overlay-gradient { background: linear-gradient(to top, rgba(27, 54, 93, 0.9) 0%, transparent 100%); }
      
      #world-slideshow { 
        position: fixed; inset: 0; z-index: -1; opacity: 0.6; /* COLOR RESTAURADO */
        background-size: cover; background-position: center;
        transition: background-image 2s ease-in-out; 
      }

      .modal { display: none; position: fixed; z-index: 200; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); }
      .mySlides { display: none; text-align: center; }
      .mySlides img { max-height: 75vh; border-radius: 2rem; margin: auto; border: 4px solid #00D1FF; box-shadow: 0 0 40px rgba(0,209,255,0.4); }
    </style>
</head>
<body class="bg-slate-900 font-sans text-white">

    <div id="world-slideshow"></div>

    <nav class="bg-white/95 backdrop-blur-md p-4 sticky top-0 z-50 flex justify-between items-center px-6 md:px-20 border-b-4 border-vt_cyan shadow-2xl">
        <img src="image_0.png" alt="VT Travel" class="h-14">
        <div class="hidden md:flex gap-8 items-center font-black text-xs uppercase text-vt_oxford italic tracking-tighter">
            <button onclick="alert('Estado de Sonora 1411-A, Las Quintas, Culiacán.')"><i class="fas fa-location-dot text-vt_cyan"></i> Culiacán</button>
            <button class="bg-vt_oxford text-white px-8 py-3 rounded-full hover:bg-vt_cyan hover:text-vt_oxford transition-all shadow-lg uppercase">Contacto</button>
        </div>
    </nav>

    <main class="py-16 px-4 md:px-20 max-w-[1400px] mx-auto relative z-10">
        <div class="text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter uppercase drop-shadow-2xl text-white">CATÁLOGO <span class="text-vt_cyan">VT</span></h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="card-modern h-[450px] lg:col-span-2" onclick="openModal(1)">
                <img src="https://images.unsplash.com/photo-1506929113675-b9299d39c1f2?auto=format&fit=crop&w=1200">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-4xl font-black italic uppercase">Playas</h3>
                </div>
            </div>

            <div class="card-modern h-[450px]" onclick="openModal(2)">
                <img src="https://images.unsplash.com/photo-1493936734716-77ba6da66365?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end text-center">
                    <h3 class="text-3xl font-black italic uppercase">Europa</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openModal(3)">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-2xl font-black italic uppercase">Lunas de Miel</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openModal(4)">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-2xl font-black italic uppercase">Viajes de XV</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openModal(5)">
                <img src="https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-2xl font-black italic uppercase">Cruceros</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openModal(6)">
                <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end text-right">
                    <h3 class="text-2xl font-black italic uppercase">Asia</h3>
                </div>
            </div>

            <div class="card-modern h-[380px] lg:col-span-2" onclick="openModal(7)">
                <img src="https://images.unsplash.com/photo-1516426122078-c23e76319801?auto=format&fit=crop&w=1200">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-3xl font-black italic uppercase">África</h3>
                </div>
            </div>
        </div>
    </main>

    <a href="https://instagram.com/vttravel_viajes/" target="_blank" class="fixed bottom-32 right-8 z-[100] bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 text-white p-5 rounded-3xl shadow-2xl animate-float">
        <i class="fab fa-instagram text-4xl"></i>
    </a>
    <a href="https://wa.me/526671234567" target="_blank" class="fixed bottom-10 right-8 z-[100] bg-[#25D366] text-white p-5 rounded-3xl shadow-2xl animate-bounce">
        <i class="fab fa-whatsapp text-4xl"></i>
    </a>

    <div id="myModal" class="modal">
        <span class="absolute top-5 right-10 text-6xl text-white cursor-pointer z-[300]" onclick="closeModal()">&times;</span>
        <div class="relative top-1/2 -translate-y-1/2 w-full text-center" id="modal-content"></div>
        <button class="absolute left-5 top-1/2 text-5xl text-vt_cyan z-[300]" onclick="plusSlides(-1)">❮</button>
        <button class="absolute right-5 top-1/2 text-5xl text-vt_cyan z-[300]" onclick="plusSlides(1)">❯</button>
    </div>

    <script>
        // SLIDESHOW FONDO COLORIDO
        const bgImg = [
            'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&w=1600&q=80',
            'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?auto=format&w=1600&q=80',
            'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&w=1600&q=80'
        ];
        let bgI = 0;
        const bgEl = document.getElementById('world-slideshow');
        function rotateBg() { bgEl.style.backgroundImage = `url('${bgImg[bgI]}')`; bgI = (bgI + 1) % bgImg.length; }
        rotateBg(); setInterval(rotateBg, 5000);

        // FOTOS CRUCEROS ESPECÍFICAS
        const fotos = {
            1: [{s:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e', t:'Playas'}],
            2: [{s:'https://images.unsplash.com/photo-1467269204594-9661b134dd2b', t:'Europa'}],
            3: [{s:'https://images.unsplash.com/photo-1544550581-5f7ceaf7f992', t:'Lunas de Miel'}],
            4: [{s:'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7', t:'XV Años'}],
            5: [
                {s:'https://images.unsplash.com/photo-1548574505-5e239809ee19', t:'Royal Caribbean'},
                {s:'https://images.unsplash.com/photo-1559640842225-85d111c60e6b', t:'MSC Cruises'},
                {s:'https://images.unsplash.com/photo-1519717143431-7e87515b6d5f', t:'Disney Cruise Line'},
                {s:'https://images.unsplash.com/photo-1540541338287-41700207eda5', t:'Norwegian Cruise Line'}
            ],
            6: [{s:'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e', t:'Asia'}],
            7: [{s:'https://images.unsplash.com/photo-1516426122078-c23e76319801', t:'África'}]
        };

        let sIdx = 1;
        function openModal(id) {
            const cont = document.getElementById('modal-content');
            cont.innerHTML = '';
            fotos[id].forEach(f => {
                cont.innerHTML += `<div class="mySlides px-4"><img src="${f.s}?auto=format&w=1200&q=80" class="mx-auto max-h-[70vh] shadow-2xl animate-fade-in"><p class="text-vt_cyan text-4xl font-black mt-8 uppercase italic tracking-widest">${f.t}</p></div>`;
            });
            document.getElementById('myModal').style.display = 'block';
            sIdx = 1; show(sIdx);
        }
        function closeModal() { document.getElementById('myModal').style.display = "none"; }
        function plusSlides(n) { show(sIdx += n); }
        function show(n) {
            let s = document.getElementsByClassName("mySlides");
            if (n > s.length) sIdx = 1; if (n < 1) sIdx = s.length;
            for (let i=0; i<s.length; i++) s[i].style.display = "none";
            s[sIdx-1].style.display = "block";
        }
    </script>
</body>
</html>
