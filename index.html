<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Travel | Agencia de Viajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { vt_oxford: '#1B365D', vt_cyan: '#00D1FF', vt_gold: '#FFC107' },
            animation: { 'float': 'floating 3.5s ease-in-out infinite' },
            keyframes: { floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } } }
          }
        }
      }
    </script>
    <style>
      .card-modern { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; overflow: hidden; border-radius: 2.5rem; }
      .card-modern:hover { transform: translateY(-15px) scale(1.03); box-shadow: 0 30px 60px rgba(0,209,255,0.3); }
      .card-modern img { transition: transform 0.8s ease; width: 100%; height: 100%; object-fit: cover; }
      .overlay-gradient { background: linear-gradient(to top, rgba(27, 54, 93, 0.9) 0%, transparent 100%); }
      
      #world-slideshow { position: fixed; inset: 0; z-index: -1; opacity: 0.6; background-size: cover; background-position: center; transition: background-image 2s ease-in-out; }

      /* MODALES MODERNOS PARA GITHUB */
      .custom-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
      .modal-box { background: #1B365D; border: 2px solid #00D1FF; border-radius: 2.5rem; width: 100%; max-width: 500px; padding: 45px; text-align: center; position: relative; box-shadow: 0 0 60px rgba(0,209,255,0.4); animation: modalIn 0.3s ease-out; }
      @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      /* GALERÍA DE DESTINOS */
      .gallery-modal { display: none; position: fixed; z-index: 400; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
      .mySlides { display: none; text-align: center; }
      .mySlides img { max-height: 75vh; border-radius: 2rem; margin: auto; border: 4px solid #00D1FF; }
    </style>
</head>
<body class="bg-slate-900 font-sans text-white">

    <div id="world-slideshow"></div>

    <nav class="bg-white/95 backdrop-blur-md p-4 sticky top-0 z-50 flex justify-between items-center px-6 md:px-20 border-b-4 border-vt_cyan shadow-2xl">
        <img src="image_0.png" alt="VT Travel" class="h-14">
        <div class="hidden md:flex gap-8 items-center font-black text-xs uppercase text-vt_oxford italic tracking-tighter">
            <button onclick="showInfo('ubicacion')" class="hover:text-vt_cyan transition-colors flex items-center gap-2">
                <i class="fas fa-location-dot text-vt_cyan"></i> Ubicación
            </button>
            <button onclick="showInfo('contacto')" class="bg-vt_oxford text-white px-9 py-3 rounded-full hover:bg-vt_cyan hover:text-vt_oxford transition-all shadow-lg uppercase">
                Contacto
            </button>
        </div>
    </nav>

    <div id="infoModal" class="custom-modal" onclick="if(event.target == this) hideInfo()">
        <div class="modal-box">
            <button onclick="hideInfo()" class="absolute top-5 right-7 text-4xl text-vt_cyan hover:text-white transition-colors">×</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <main class="py-16 px-4 md:px-20 max-w-[1400px] mx-auto relative z-10">
        <div class="text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter uppercase drop-shadow-2xl">CATÁLOGO <span class="text-vt_cyan">VT</span></h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="card-modern h-[450px] lg:col-span-2" onclick="openGallery(1)">
                <img src="https://images.unsplash.com/photo-1506929113675-b9299d39c1f2?auto=format&fit=crop&w=1200">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-4xl font-black italic uppercase">Playas</h3>
                </div>
            </div>

            <div class="card-modern h-[450px]" onclick="openGallery(2)">
                <img src="https://images.unsplash.com/photo-1493936734716-77ba6da66365?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end text-center">
                    <h3 class="text-3xl font-black italic uppercase">Europa</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openGallery(5)">
                <img src="https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-2xl font-black italic uppercase">Cruceros</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openGallery(3)">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end">
                    <h3 class="text-2xl font-black italic uppercase">Lunas de Miel</h3>
                </div>
            </div>

            <div class="card-modern h-[380px]" onclick="openGallery(4)">
                <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=800">
                <div class="absolute inset-0 overlay-gradient p-10 flex flex-col justify-end text-right">
                    <h3 class="text-2xl font-black italic uppercase">Viajes de XV</h3>
                </div>
            </div>
        </div>
    </main>

    <div id="galleryModal" class="gallery-modal">
        <span class="absolute top-5 right-10 text-6xl text-white cursor-pointer z-[500]" onclick="closeGallery()">×</span>
        <div class="relative top-1/2 -translate-y-1/2 w-full text-center" id="gallery-content"></div>
        <button class="absolute left-5 top-1/2 text-5xl text-vt_cyan z-[500]" onclick="plusSlides(-1)">❮</button>
        <button class="absolute right-5 top-1/2 text-5xl text-vt_cyan z-[500]" onclick="plusSlides(1)">❯</button>
    </div>

    <script>
        // LÓGICA DE LOS MODALES DE INFORMACIÓN
        function showInfo(tipo) {
            const modal = document.getElementById('infoModal');
            const content = document.getElementById('modalContent');
            if(tipo === 'ubicacion') {
                content.innerHTML = `
                    <i class="fas fa-map-marked-alt text-6xl text-vt_cyan mb-6"></i>
                    <h2 class="text-3xl font-black italic mb-4 uppercase">NUESTRA OFICINA</h2>
                    <p class="text-lg mb-8 opacity-90 leading-relaxed">Estado de Sonora 1411-A, Las Quintas,<br>80060 Culiacán Rosales, Sin.</p>
                    <a href="https://maps.google.com/?q=Estado+de+Sonora+1411-A+Culiacán" target="_blank" class="bg-vt_cyan text-vt_oxford font-black py-4 px-10 rounded-full uppercase italic hover:bg-white transition-all inline-block shadow-lg">Abrir en el Mapa</a>
                `;
            } else {
                content.innerHTML = `
                    <i class="fas fa-comments text-6xl text-vt_cyan mb-6"></i>
                    <h2 class="text-3xl font-black italic mb-4 uppercase">CONTÁCTANOS</h2>
                    <p class="text-xl mb-2 font-bold">(667) 712 4455 / 715 0101</p>
                    <p class="text-lg mb-8 text-vt_cyan font-medium italic underline">candyojeda@hotmail.com</p>
                    <a href="https://wa.me/526674453071" target="_blank" class="bg-[#25D366] text-white font-black py-4 px-10 rounded-full uppercase italic hover:scale-105 transition-all inline-block shadow-lg"><i class="fab fa-whatsapp mr-2"></i>Enviar WhatsApp</a>
                `;
            }
            modal.style.display = 'flex';
        }

        function hideInfo() { document.getElementById('infoModal').style.display = 'none'; }

        // SLIDESHOW DE FONDO
        const bgImg = [
            'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&w=1600&q=80',
            'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?auto=format&w=1600&q=80',
            'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&w=1600&q=80'
        ];
        let bgI = 0;
        const bgEl = document.getElementById('world-slideshow');
        function rotateBg() { bgEl.style.backgroundImage = `url('${bgImg[bgI]}')`; bgI = (bgI + 1) % bgImg.length; }
        rotateBg(); setInterval(rotateBg, 5000);

        // LÓGICA DE GALERÍA (CRUCEROS REALES)
        const fotos = {
            5: [
                {s:'https://images.unsplash.com/photo-1548574505-5e239809ee19', t:'Royal Caribbean'},
                {s:'https://images.unsplash.com/photo-1559640842225-85d111c60e6b', t:'MSC Cruises'},
                {s:'https://images.unsplash.com/photo-1519717143431-7e87515b6d5f', t:'Disney Cruise Line'},
                {s:'https://images.unsplash.com/photo-1540541338287-41700207eda5', t:'Norwegian Cruise Line'}
            ]
        };

        let slideIndex = 1;
        function openGallery(id) {
            if(!fotos[id]) return;
            const cont = document.getElementById('gallery-content');
            cont.innerHTML = '';
            fotos[id].forEach(f => {
                cont.innerHTML += `<div class="mySlides px-4"><img src="${f.s}?auto=format&w=1200&q=80" class="mx-auto shadow-2xl"><p class="text-vt_cyan text-4xl font-black mt-8 uppercase italic tracking-widest">${f.t}</p></div>`;
            });
            document.getElementById('galleryModal').style.display = 'block';
            slideIndex = 1; showSlides(slideIndex);
        }
        function closeGallery() { document.getElementById('galleryModal').style.display = "none"; }
        function plusSlides(n) { showSlides(slideIndex += n); }
        function showSlides(n) {
            let slides = document.getElementsByClassName("mySlides");
            if (n > slides.length) slideIndex = 1; if (n < 1) slideIndex = slides.length;
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slides[slideIndex-1].style.display = "block";
        }
    </script>
</body>
</html>
